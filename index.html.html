<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전보건 작업계획서 발행 시스템</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (브라우저에서 React JSX 실행) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Babel의 기본 런타임(automatic)으로 인한 react/jsx-runtime import 에러 및 pragma 에러를 방지하기 위해
        // React.createElement를 사용하는 'classic' 런타임을 명시적으로 설정합니다.
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <style>
        /* 기본 폰트 적용 */
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        
        /* 인쇄 전용 최적화 */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    
    <!-- React 앱이 렌더링될 영역 -->
    <div id="root" class="flex-1 flex flex-col w-full h-full"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useRef, useEffect } = React;

        // --- 표준화된 데이터 ---
        const STANDARD_METHODS = [
          {
            id: "적재",
            title: "1. 자재 적재 방법",
            items: [
              "사업장 내 지정장소에 화물자동차를 위치시킨다. (시동 정지, 바퀴 고임목 설치)",
              "적재작업 주변 작업자 외 인원이 접근하지 못하도록 구획설정 및 통제를 실시한다.",
              "완제품 등이 낙하되지 않도록 고정된 상태에서 지게차를 통해 안전하게 적재한다."
            ]
          },
          {
            id: "하역",
            title: "2. 자재 하역 방법",
            items: [
              "하역장소에 화물자동차를 위치시킨다. (시동 정지, 바퀴 고임목 설치)",
              "하역작업 주변 작업자 외 인원이 접근하지 못하도록 구획설정 및 통제를 실시한다.",
              "완제품 등이 낙하되지 않도록 고정된 상태에서 지게차를 통해 안전하게 하역한다."
            ]
          },
          {
            id: "원료투입",
            title: "3. 원료 투입 방법",
            items: [
              "하역장소에 탱크로리 차량을 위치시킨다. (시동 정지, 바퀴 고임목 설치)",
              "하역작업 주변 작업자 외 인원이 접근하지 못하도록 구획설정 및 통제를 실시한다.",
              "투입배관과 탱크로리 호스 연결 및 체결 및 체결상태를 확인한다.",
              "체결 상태가 이상이 없을 경우 원료 투입을 실시한다."
            ]
          }
        ];

        const RISK_PREVENTIONS = [
          {
            type: "추락",
            factor: "① 화물차 적재함 승/하차 시 추락\n② 적재함 내부 상부에서 작업 중 추락\n③ 운전석 승하차 중 발을 헛디뎌 추락",
            prevention: "① 안전모, 안전화 착용 후 적재함 탑승\n② 적재함 오르내릴 시 도약 금지\n③ 화물 위 등 높은 곳에서 작업 시 안전대 착용 부착설비 체결\n④ 승하차 시 손잡이 이용\n⑤ 뛰어내리기 금지"
          },
          {
            type: "낙하",
            factor: "① 적재된 물품의 결속 불량으로 낙하\n② 지게차 등으로 하역/운반 중 화물 낙하",
            prevention: "① 하역 작업반경 내 출입 통제\n② 완제품 및 자재는 단단히 결속/ 고정 된 상태에서 작업"
          },
          {
            type: "전도",
            factor: "① 적재함 바닥 요철, 방치된 자재에 걸림\n② 우천, 강설 기름 등으로 인한 미끄러짐\n③ 탱크 상부 이동 중 미끄러짐",
            prevention: "① 작업 전/후 적재함 바닥 정돈 철저\n② 안전모 및 안전화 착용\n③ 이동 작업 시 급하게 올라가는 행동 금지"
          },
          {
            type: "협착/충돌",
            factor: "① 화물차와 주변 시설물 사이 끼임\n② 차량의 급출발/급후진에 의한 끼임\n③ 차량과 보행자 간 충돌 및 끼임",
            prevention: "① 작업지휘자, 신호수 배치\n② 상/하역 작업 중 시동 정지, 주차 브레이크 체결 및 바퀴 고임목 설치\n③ 교차로 진입 시 일시 정지 및 주변 확인 후 이동\n④ 전방주시 철저 및 10km 속도 유지"
          },
          {
            type: "부딪힘",
            factor: "① 호스 이탈로 인한 부속품과의 부딪힘\n② 차량 하부 등 육안 확인 중 주변장애물에 부딪힘",
            prevention: "① 원료 투입 전 호스 등 접속부위 체결상태 확인\n② 작업 전 안전모 및 안전화 착용"
          }
        ];

        const INITIAL_FORM_DATA = {
            id: null,
            generatedAt: null,
            factory: '순창공장',     // 출입공장 기본값
            date: new Date().toISOString().split('T')[0],
            entryTime: new Date().toTimeString().substring(0, 5), // 현재 시간(HH:MM)을 출입시간 기본값으로
            exitTime: '',          // 출차 시간
            company: '',           // 소속(업체명)
            driverName: '',
            vehicleNo: '',
            vehicleType: '카고트럭',
            capacity: '1t 이하',
            workArea: '완제품창고',   // 작업구역 기본값
            workRoute: '',
            workTypes: [],
            agreed: false,
            signatureUrl: null
        };

        function App() {
          const [view, setView] = useState('input'); // 'input', 'print', 'history'
          const [history, setHistory] = useState([]); // 발급 기록 배열
          const [errorMsg, setErrorMsg] = useState('');
          const [formData, setFormData] = useState(INITIAL_FORM_DATA);

          // 서명 패드 (Canvas) 관련 상태 및 Ref
          const canvasRef = useRef(null);
          const [isDrawing, setIsDrawing] = useState(false);

          // 뷰가 변경될 때마다 서명 패드 컨텍스트 초기화 (입력 화면일 때만)
          useEffect(() => {
            if (view === 'input' && canvasRef.current) {
              const canvas = canvasRef.current;
              const ctx = canvas.getContext('2d');
              ctx.lineWidth = 4;
              ctx.lineCap = 'round';
              ctx.strokeStyle = '#000000';
            }
          }, [view]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
            setErrorMsg('');
          };

          const toggleWorkType = (typeId) => {
            setFormData(prev => {
              const isSelected = prev.workTypes.includes(typeId);
              const newWorkTypes = isSelected 
                ? prev.workTypes.filter(t => t !== typeId)
                : [...prev.workTypes, typeId];
              return { ...prev, workTypes: newWorkTypes };
            });
            setErrorMsg('');
          };

          // --- 서명 패드 핸들러 (모바일 스케일링 대응) ---
          const getCoordinates = (e) => {
            const canvas = canvasRef.current;
            if (!canvas) return { x: 0, y: 0 };
            const rect = canvas.getBoundingClientRect();
            
            // CSS 크기 대비 실제 캔버스 해상도 스케일 계산
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
            } else {
              clientX = e.clientX;
              clientY = e.clientY;
            }

            return { 
              x: (clientX - rect.left) * scaleX, 
              y: (clientY - rect.top) * scaleY 
            };
          };

          const startDrawing = (e) => {
            e.preventDefault();
            const { x, y } = getCoordinates(e);
            const ctx = canvasRef.current.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(x, y);
            setIsDrawing(true);
          };

          const draw = (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const { x, y } = getCoordinates(e);
            const ctx = canvasRef.current.getContext('2d');
            ctx.lineTo(x, y);
            ctx.stroke();
          };

          const stopDrawing = () => {
            if (isDrawing) {
              setIsDrawing(false);
              setFormData(prev => ({ ...prev, signatureUrl: canvasRef.current.toDataURL('image/png') }));
              setErrorMsg('');
            }
          };

          const clearSignature = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setFormData(prev => ({ ...prev, signatureUrl: null }));
          };

          // --- 유효성 검사 및 생성 (기록 저장) ---
          const handleGenerate = () => {
            if (!formData.date || !formData.entryTime || !formData.company || !formData.driverName || !formData.vehicleNo) {
              setErrorMsg("필수 기본 정보를 모두 기재해주세요."); return;
            }
            if (!formData.workRoute.trim()) {
              setErrorMsg("작업구역 및 운행경로를 상세히 입력해주세요."); return;
            }
            if (formData.workTypes.length === 0) {
              setErrorMsg("금일 작업 목적을 1개 이상 선택해주세요."); return;
            }
            if (!formData.signatureUrl) {
              setErrorMsg("서명란에 직접 전자 서명을 진행해주세요. (법적 증빙용)"); return;
            }
            if (!formData.agreed) {
              setErrorMsg("안전수칙 준수 서약에 동의(체크박스) 해주세요."); return;
            }
            
            setErrorMsg('');

            // 고유 ID 및 생성 시간 부여하여 기록 배열에 저장
            const newRecord = { 
                ...formData, 
                id: formData.id || Date.now(), 
                generatedAt: formData.generatedAt || new Date().toLocaleString()
            };
            
            setHistory(prev => {
                // 이미 존재하는 ID면 수정(덮어쓰기), 없으면 새 기록으로 추가
                const exists = prev.find(item => item.id === newRecord.id);
                if (exists) {
                    return prev.map(item => item.id === newRecord.id ? newRecord : item);
                }
                return [newRecord, ...prev];
            });

            setFormData(newRecord);
            setView('print');
          };

          // --- 네비게이션 제어 ---
          const handleStartNew = () => {
            setFormData(INITIAL_FORM_DATA);
            setErrorMsg('');
            setView('input');
          };

          const handleOpenRecord = (record) => {
            setFormData(record);
            setView('print');
          };

          // 작성 완료된 문서만 단일 HTML로 다운로드
          const handleDownloadHTML = () => {
            const printElement = document.getElementById('print-area');
            if (!printElement) return;

            const contentHTML = printElement.innerHTML;
            
            // 프리뷰어 및 브라우저 파서 충돌을 방지하는 안전한 템플릿 문자열
            const htmlString = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>작업계획서_${formData.date}_${formData.company}</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #e5e7eb; margin: 0; padding: 40px 20px; display: flex; justify-content: center; font-family: "Malgun Gothic", sans-serif; }
    .doc-container { background: white; padding: 40px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 210mm; min-height: 297mm; }
    @media print {
      body { background-color: white; padding: 0; display: block; }
      .doc-container { box-shadow: none; padding: 0; width: 100%; min-height: auto; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="doc-container">
    ${contentHTML}
  </div>
</body>
</html>`;

            const blob = new Blob([htmlString], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `작업계획서_${formData.date}_${formData.company}_${formData.driverName}.html`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          };

          // 안정적인 인쇄 호출을 위한 함수
          const handlePrint = () => {
            setTimeout(() => {
              window.focus();
              window.print();
            }, 150);
          };

          const filteredMethods = formData.workTypes.length > 0 
            ? STANDARD_METHODS.filter(m => formData.workTypes.includes(m.id))
            : STANDARD_METHODS;

          // --- 렌더링: 기록 조회 화면 (공장/월별 그룹화 적용) ---
          const renderHistoryView = () => {
            // 발급 기록 그룹화 (1차: 공장, 2차: 월별)
            const groupedHistory = {};
            history.forEach(record => {
                const factory = record.factory || '미지정';
                const monthStr = record.date.substring(0, 7); // 'YYYY-MM'
                const [year, month] = monthStr.split('-');
                const displayMonth = `${year}년 ${month}월`;

                if (!groupedHistory[factory]) groupedHistory[factory] = {};
                if (!groupedHistory[factory][displayMonth]) groupedHistory[factory][displayMonth] = [];
                
                groupedHistory[factory][displayMonth].push(record);
            });

            return (
              <div className="max-w-[1200px] mx-auto p-4 md:p-6 mt-4 md:mt-8">
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <div className="bg-gray-50 border-b border-gray-200 p-5 flex justify-between items-center">
                    <h2 className="text-lg md:text-xl font-bold text-gray-800 flex items-center">
                      <i className="fa-solid fa-clock-rotate-left mr-3 text-blue-600"></i> 작업계획서 발급 기록
                    </h2>
                    <span className="text-xs md:text-sm bg-blue-100 text-blue-800 py-1 px-3 rounded-full font-bold">
                      총 {history.length}건
                    </span>
                  </div>
                  
                  <div className="p-0">
                    {history.length === 0 ? (
                      <div className="text-center text-gray-500 py-16 flex flex-col items-center">
                        <i className="fa-regular fa-folder-open text-4xl mb-4 text-gray-300"></i>
                        <p>아직 발급된 작업계획서 기록이 없습니다.</p>
                        <button onClick={handleStartNew} className="mt-4 px-4 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">
                          첫 문서 작성하기
                        </button>
                      </div>
                    ) : (
                      <div className="p-4 md:p-6 space-y-8">
                        {Object.keys(groupedHistory).sort().map(factory => (
                          <div key={factory} className="border border-blue-200 rounded-lg overflow-hidden shadow-sm">
                            {/* 공장별 헤더 */}
                            <div className="bg-slate-700 text-white p-3 md:p-4 flex items-center justify-between">
                              <div className="flex items-center">
                                <i className="fa-solid fa-industry mr-3 text-blue-300"></i>
                                <h3 className="text-lg font-bold">{factory}</h3>
                              </div>
                            </div>
                            
                            {/* 월별 데이터 */}
                            <div className="bg-white">
                              {Object.keys(groupedHistory[factory]).sort((a, b) => b.localeCompare(a)).map(month => (
                                <div key={month} className="border-b border-gray-200 last:border-b-0">
                                  {/* 월별 소제목 */}
                                  <div className="bg-slate-100 text-gray-800 p-2 px-4 font-bold text-sm flex items-center border-b border-gray-200">
                                    <i className="fa-regular fa-calendar-check mr-2 text-blue-600"></i> {month}
                                    <span className="ml-3 text-xs font-bold bg-white text-blue-600 border border-blue-200 px-2 py-0.5 rounded-full">
                                      {groupedHistory[factory][month].length}건
                                    </span>
                                  </div>
                                  {/* 데이터 테이블 */}
                                  <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left border-collapse min-w-[800px]">
                                      <thead className="bg-white text-gray-500 text-xs border-b border-gray-200">
                                        <tr>
                                          <th className="p-3 w-40">발급 일시</th>
                                          <th className="p-3 w-28">작업 일자</th>
                                          <th className="p-3">소속 (업체명)</th>
                                          <th className="p-3 w-28">운전자 성명</th>
                                          <th className="p-3 w-32">차량번호</th>
                                          <th className="p-3">작업 목적</th>
                                          <th className="p-3 w-24 text-center">관리</th>
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {groupedHistory[factory][month].sort((a, b) => new Date(b.generatedAt) - new Date(a.generatedAt)).map((record) => (
                                          <tr key={record.id} className="border-b border-gray-100 hover:bg-blue-50 transition">
                                            <td className="p-3 text-gray-500 text-xs">{record.generatedAt}</td>
                                            <td className="p-3 font-bold text-gray-800">{record.date}</td>
                                            <td className="p-3 font-bold text-blue-800">{record.company}</td>
                                            <td className="p-3">{record.driverName}</td>
                                            <td className="p-3 font-mono text-gray-600">{record.vehicleNo}</td>
                                            <td className="p-3">
                                              <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-semibold">{record.workTypes.join(', ')}</span>
                                            </td>
                                            <td className="p-3 text-center">
                                              <button onClick={() => handleOpenRecord(record)} className="px-3 py-1.5 bg-white border border-blue-600 text-blue-700 hover:bg-blue-600 hover:text-white rounded font-bold text-xs transition shadow-sm">
                                                문서 보기
                                              </button>
                                            </td>
                                          </tr>
                                        ))}
                                      </tbody>
                                    </table>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          // --- 렌더링: PC 입력 화면 ---
          const renderInputView = () => (
            <div className="flex-1 max-w-[1600px] mx-auto w-full p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
              {/* 좌측: 정보 입력 폼 */}
              <div className="lg:col-span-4 flex flex-col space-y-5">
                <div className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">

                <div className="flex flex-wrap justify-center gap-2 w-full md:w-auto">
                  {view === 'input' && (
                    <button onClick={() => setView('history')} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded text-sm font-bold transition flex items-center">
                      <i className="fa-solid fa-list mr-2"></i> 발급 기록 보기
                      {history.length > 0 && <span className="ml-2 bg-blue-500 text-white text-xs px-2 py-0.5 rounded-full">{history.length}</span>}
                    </button>
                  )}
                  
                  {view === 'history' && (
                    <button onClick={handleStartNew} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold transition flex items-center shadow-lg">
                      <i className="fa-solid fa-plus mr-2"></i> 새 계획서 작성
                    </button>
                  )}

                  {view === 'print' && (
                    <>
                      <button onClick={() => setView('input')} className="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm font-bold transition">
                        <i className="fa-solid fa-pen-to-square md:mr-2"></i><span className="hidden md:inline">내용 수정</span>
                      </button>
                      <button onClick={() => setView('history')} className="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm font-bold transition">
                        <i className="fa-solid fa-list md:mr-2"></i><span className="hidden md:inline">기록 목록</span>
                      </button>
                      <button onClick={handleDownloadHTML} className="px-3 py-2 bg-emerald-600 hover:bg-emerald-500 rounded text-sm font-bold transition flex items-center">
                        <i className="fa-solid fa-file-arrow-down md:mr-2"></i><span className="hidden md:inline">저장(HTML)</span>
                      </button>
                      <button onClick={handlePrint} className="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-bold transition flex items-center shadow-lg">
                        <i className="fa-solid fa-print md:mr-2"></i><span className="hidden md:inline">인쇄/PDF</span><span className="inline md:hidden">출력</span>
                      </button>
                    </>
                  )}
                </div>
              </header>

              {/* Main Container */}
              <main className="flex-1 w-full bg-slate-100 print-bg-white print-padding-0 overflow-x-hidden">
                {view === 'input' && renderInputView()}
                {view === 'history' && renderHistoryView()}
                {view === 'print' && (
                  <div className="p-4 md:p-8 pb-20 flex justify-center print:p-0 print:block">
                     {renderPrintView()}
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
